<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
   <link rel="stylesheet" href="/prot.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        form {
            max-width: 500px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }
        .radio-group, .checkbox-group {
            margin-top: 10px;
        }
        .radio-group label, .checkbox-group label {
            font-weight: normal;
            display: inline-block;
            margin-right: 15px;
        }
        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Student Registration Form</h1>
    <form action="#" method="post">
        <!-- Name -->
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>

        <!-- Registration Number -->
        <label for="regno">Registration Number:</label>
        <input type="text" id="regno" name="regno" placeholder="Enter your registration number" required>

        <!-- Email -->
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <!-- Password -->
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter a password" required>

        <!-- Course Selection -->
        <label for="course">Select Course:</label>
        <select id="course" name="course" required>
            <option value="">--Choose a course--</option>
            <option value="CS101">CS101 - Introduction to CS</option>
            <option value="CS102">CS102 - Data Structures</option>
            <option value="CS103">CS103 - Web Development</option>
        </select>

        <!-- Semester -->
        <div class="radio-group">
            <label>Semester:</label>
            <label><input type="radio" name="semester" value="Spring" required> Spring</label>
            <label><input type="radio" name="semester" value="Fall"> Fall</label>
        </div>

        <!-- Terms and Conditions -->
        <div class="checkbox-group">
            <label><input type="checkbox" name="terms" required> I agree to the terms and conditions</label>
        </div>

        <!-- Submit Button -->
        <button type="submit">Register</button>
    </form>
</body>
</html>
