<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Grid</title>
    <link rel="stylesheet" href="/styles/ecommerce.css">
</head>
<body>

<header class="header">
    <h1>Shop</h1>
    <button class="filter-btn" onclick="toggleFilter()">☰ Filters</button>
</header>

<div class="layout">

    <!-- Sidebar Filters -->
    <aside class="sidebar" id="sidebar">
        <h3>Filters</h3>
        <p><input type="checkbox"> Electronics</p>
        <p><input type="checkbox"> Clothing</p>
        <p><input type="checkbox"> Accessories</p>
    </aside>

    <!-- Product Grid -->
    <main class="products">

        <div class="card">
            <img src="https://placehold.jp/200x200.png" alt="Product">
            <h3>Product 1</h3>
            <p>$20</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://placehold.jp/200x200.png" alt="Product">
            <h3>Product 2</h3>
            <p>$35</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://placehold.jp/200x200.png" alt="Product">
            <h3>Product 3</h3>
            <p>$50</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://placehold.jp/200x200.png" alt="Product">
            <h3>Product 4</h3>
            <p>$18</p>
            <button>Add to Cart</button>
        </div>

    </main>

</div>

<script>
function toggleFilter() {
    document.getElementById("sidebar").classList.toggle("active");
}
</script>

</body>
</html>
