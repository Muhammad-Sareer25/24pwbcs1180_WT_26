<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Property</title>

    <!-- Link external CSS -->
    <link rel="stylesheet" href="/styles/ex01.css">
</head>
<body>

    <h2>Display: Block</h2>
    <div class="block-div">Block Element 1</div>
    <div class="block-div">Block Element 2</div>

    <h2>Display: Inline</h2>
    <span class="inline-span">Inline 1</span>
    <span class="inline-span">Inline 2</span>

    <h2>Display: Inline-Block</h2>
    <div class="inline-block-box">Box 1</div>
    <div class="inline-block-box">Box 2</div>

    <h2>Display: None vs Visibility: Hidden</h2>

    <p>This text is visible.</p>

    <p class="hidden-display">This is display: none (removed)</p>

    <p class="hidden-visibility">This is visibility: hidden (space remains)</p>

    <p>This text comes after hidden elements.</p>

</body>
</html>
