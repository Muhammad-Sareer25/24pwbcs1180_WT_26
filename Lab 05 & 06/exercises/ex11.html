<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Item Properties</title>
    <link rel="stylesheet" href="/styles/ex11.css">
</head>
<body>

    <h2>1. grid-column & grid-row</h2>
    <div class="grid basic-grid">
        <div class="item item1">1</div>
        <div class="item item2">2</div>
        <div class="item item3">3</div>
        <div class="item item4">4</div>
    </div>

    <h2>2. grid-area (named placement)</h2>
    <div class="grid area-grid">
        <div class="header">Header</div>
        <div class="sidebar">Sidebar</div>
        <div class="content">Content</div>
        <div class="footer">Footer</div>
    </div>

    <h2>3. justify-self & align-self</h2>
    <div class="grid align-grid">
        <div class="item self1">Start</div>
        <div class="item self2">Center</div>
        <div class="item self3">End</div>
        <div class="item self4">Stretch</div>
    </div>

</body>
</html>
