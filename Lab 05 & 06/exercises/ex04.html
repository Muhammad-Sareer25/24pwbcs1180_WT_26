<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float Advanced</title>
    <link rel="stylesheet" href="/styles/ex04.css">
</head>
<body>

    <h2>1. Float Collapse Problem & Clearfix</h2>
    <div class="container clearfix">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
    </div>

    <h2>2. Equal Height Columns</h2>
    <div class="equal-container clearfix">
        <div class="equal-box">Short content</div>
        <div class="equal-box tall">Long content<br>More text<br>More text</div>
    </div>

    <h2>3. Float-based Grid System</h2>
    <div class="row clearfix">
        <div class="col-4">4 Columns</div>
        <div class="col-4">4 Columns</div>
        <div class="col-4">4 Columns</div>
    </div>

    <div class="row clearfix">
        <div class="col-6">6 Columns</div>
        <div class="col-6">6 Columns</div>
    </div>

    <h2>4. Responsive Floats</h2>
    <div class="row clearfix">
        <div class="responsive-box">Box 1</div>
        <div class="responsive-box">Box 2</div>
        <div class="responsive-box">Box 3</div>
    </div>

</body>
</html>
