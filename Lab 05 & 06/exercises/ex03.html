<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float Layouts</title>
    <link rel="stylesheet" href="/styles/ex03.css">
</head>
<body>

    <h2>1. Float Image with Text Wrapping</h2>
    <div class="image-text">
        <img src="https://placehold.jp/150x150.png" alt="Sample Image">
        <p>
            This is an example of text wrapping around an image using float.
            The image is floated to the left, and the text flows around it.
        </p>
    </div>

    <h2>2. Two Column Layout</h2>
    <div class="clearfix">
        <div class="col col-2">Column 1</div>
        <div class="col col-2">Column 2</div>
    </div>

    <h2>3. Three Column Layout</h2>
    <div class="clearfix">
        <div class="col col-3">Column 1</div>
        <div class="col col-3">Column 2</div>
        <div class="col col-3">Column 3</div>
    </div>

</body>
</html>
