<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Photo Gallery</title>
    <link rel="stylesheet" href="/styles/gallery.css">
</head>
<body>

    <h1>CSS Grid Photo Gallery</h1>

    <div class="gallery">

        <div class="item item1">
            <img src="https://placehold.jp/300x200.png" alt="Image 1">
            <div class="overlay">Image 1</div>
        </div>

        <div class="item item2">
            <img src="https://placehold.jp/300x400.png" alt="Image 2">
            <div class="overlay">Image 2</div>
        </div>

        <div class="item item3">
            <img src="https://placehold.jp/300x250.png" alt="Image 3">
            <div class="overlay">Image 3</div>
        </div>

        <div class="item item4">
            <img src="https://placehold.jp/300x300.png" alt="Image 4">
            <div class="overlay">Image 4</div>
        </div>

        <div class="item item5">
            <img src="https://placehold.jp/300x350.png" alt="Image 5">
            <div class="overlay">Image 5</div>
        </div>

    </div>

</body>
</html>
