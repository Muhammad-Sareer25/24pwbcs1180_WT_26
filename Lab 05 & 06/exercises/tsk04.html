<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Navigation</title>
    <link rel="stylesheet" href="/styles/nav.css">
</head>
<body>

<!-- Top Navigation -->
<nav class="navbar">
    <div class="logo">MySite</div>

    <!-- Hamburger -->
    <div class="hamburger" onclick="toggleMenu()">☰</div>

    <ul class="nav-links" id="navLinks">
        <li><a href="#">Home</a></li>

        <!-- Dropdown -->
        <li class="dropdown">
            <a href="#">Services</a>
            <ul class="dropdown-menu">
                <li><a href="#">Web Design</a></li>
                <li><a href="#">Development</a></li>
            </ul>
        </li>

        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h3>Sidebar Menu</h3>
        <a href="#">Dashboard</a>
        <a href="#">Profile</a>
        <a href="#">Settings</a>
    </aside>

    <!-- Main Content -->
    <main class="content">
        <h1>Welcome</h1>
        <p>Responsive navigation system using Flexbox.</p>
    </main>

</div>

<script>
function toggleMenu() {
    document.getElementById("navLinks").classList.toggle("active");
}
</script>

</body>
</html>
