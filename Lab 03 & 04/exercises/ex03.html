    <body>
       
<h1>CSS Attribute Selectors</h1>

<h2>1. Attribute Selector</h2>
<a href="https://www.facebook.com" target="_blank">Facbook Link (target attribute)</a>

<h2>2. Attribute Value Selector</h2>
<input type="text" placeholder="Text input">
<input type="password" placeholder="Password input">

<h2>3. Partial Value Matching</h2>
<a href="https://www.google.com">Google Link</a>

<h2>4. Begins With Selector</h2>
<a href="https://www.wikipedia.org">Wikipedia</a>

<h2>5. Ends With Selector</h2>
<a href="https://www.microsoft.com">Microsoft</a>
<a href="https://www.example.org">Example Org</a>
    </body>
