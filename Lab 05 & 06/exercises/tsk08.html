<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/styles/dshboard.css">
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>Dashboard</h2>
        <a href="#">Home</a>
        <a href="#">Analytics</a>
        <a href="#">Users</a>
        <a href="#">Settings</a>
    </aside>

    <!-- Main content -->
    <main class="main">
        <header>
            <h1>Welcome, Admin</h1>
        </header>

        <!-- Stats cards -->
        <section class="stats">
            <div class="card">
                <h3>Users</h3>
                <p>1,200</p>
            </div>
            <div class="card">
                <h3>Sales</h3>
                <p>$34,500</p>
            </div>
            <div class="card">
                <h3>Orders</h3>
                <p>320</p>
            </div>
            <div class="card">
                <h3>Visitors</h3>
                <p>8,500</p>
            </div>
        </section>

        <!-- Content area -->
        <section class="content">
            <p>This area can contain charts, tables, or other widgets.</p>
        </section>

    </main>

</body>
</html>
