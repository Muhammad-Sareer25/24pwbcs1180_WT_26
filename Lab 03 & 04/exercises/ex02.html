<!DOCTYPE html>
<head>

    <link rel="stylesheet" href="/styles/basicselector.css">
    <body>
        
    <h1>CSS Basic Selectors</h1>

<p>This paragraph is styled using an <b>element selector</b>.</p>

<p class="highlight">
This paragraph uses a <b>class selector</b> called "highlight".
</p>

<div>
This div element is styled using the <b>div element selector</b>.
</div>

<p id="special">
This paragraph uses an <b>ID selector</b>.
</p>

<p>
All elements also inherit font style from the <b>universal selector</b>.
</p>
    </body>
</head>
