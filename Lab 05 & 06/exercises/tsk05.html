<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Cards</title>
    <link rel="stylesheet" href="/styles/cards.css">
</head>
<body>

    <h1>Flexbox Card Layout</h1>

    <div class="card-container">

        <div class="card">
            <h2>Card 1</h2>
            <p>This is a short description.</p>
            <div class="actions">
                <button>Read More</button>
            </div>
        </div>

        <div class="card">
            <h2>Card 2</h2>
            <p>
                This card has more content to demonstrate equal height behavior.
                Flexbox ensures all cards remain equal height regardless of content length.
            </p>
            <div class="actions">
                <button>Read More</button>
            </div>
        </div>

        <div class="card">
            <h2>Card 3</h2>
            <p>Another example card.</p>
            <div class="actions">
                <button>Read More</button>
            </div>
        </div>

    </div>

</body>
</html>
