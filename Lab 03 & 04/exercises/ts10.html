<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced CSS Effects Showcase</title>
<link rel="stylesheet" href="/styles/ts10.css">
</head>
<body>

<h1>Advanced CSS Effects Showcase</h1>

<!-- Gradient Text -->
<h2 class="gradient-text">Gradient Text Effect</h2>

<!-- Custom Checkboxes and Radios -->
<div class="form-group">
<label class="custom-checkbox">
<input type="checkbox">
<span class="checkmark"></span> Option 1
</label>

<label class="custom-checkbox">
<input type="checkbox">
<span class="checkmark"></span> Option 2
</label>

<label class="custom-radio">
<input type="radio" name="choice">
<span class="radiomark"></span> Choice A
</label>

<label class="custom-radio">
<input type="radio" name="choice">
<span class="radiomark"></span> Choice B
</label>
</div>

<!-- Loading Animation -->
<div class="loader"></div>

<!-- Text Clipping with Background Image -->
<h2 class="clipped-text">Text with Background Image</h2>

<!-- Complex Shadows -->
<div class="shadow-box">Complex Shadow Box</div>

</body>
</html>
