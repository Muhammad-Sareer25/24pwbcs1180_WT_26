<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positioning Challenge</title>
    <link rel="stylesheet" href="/styles/postion.css">
</head>
<body>

    <!-- Fixed Header -->
    <header class="header">
        <h1>My Website</h1>
    </header>

    <div class="container">

        <!-- Sticky Sidebar -->
        <aside class="sidebar">
            <h3>Sidebar</h3>
            <p>Sticky content</p>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <h2>Main Content</h2>
            <p>Scroll down to see sticky sidebar and modal layering.</p>
            <button onclick="openModal()">Open Modal</button>

            <div class="spacer"></div>
        </main>

    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-box">
            <h2>Modal Dialog</h2>
            <p>This is an absolutely positioned modal.</p>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>

    <!-- JS for modal -->
    <script>
        function openModal() {
            document.getElementById("modal").style.display = "block";
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }
    </script>

</body>
</html>
