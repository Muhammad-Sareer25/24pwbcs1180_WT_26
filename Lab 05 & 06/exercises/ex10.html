<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Container Properties</title>
    <link rel="stylesheet" href="/styles/ex10.css">
</head>
<body>

    <h2>1. display: grid</h2>
    <div class="grid grid-basic">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
    </div>

    <h2>2. grid-template-columns & grid-template-rows</h2>
    <div class="grid grid-structure">
        <div class="item">A</div>
        <div class="item">B</div>
        <div class="item">C</div>
        <div class="item">D</div>
    </div>

    <h2>3. grid-template-areas</h2>
    <div class="grid grid-areas">
        <div class="header">Header</div>
        <div class="sidebar">Sidebar</div>
        <div class="content">Content</div>
        <div class="footer">Footer</div>
    </div>

    <h2>4. gap (gutter)</h2>
    <div class="grid grid-gap">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
    </div>

    <h2>5. justify-items & align-items</h2>
    <div class="grid grid-align">
        <div class="item">Top Left</div>
        <div class="item">Top Right</div>
        <div class="item">Bottom Left</div>
        <div class="item">Bottom Right</div>
    </div>

</body>
</html>
