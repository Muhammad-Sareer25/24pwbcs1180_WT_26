<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Display</title>
    <link rel="stylesheet" href="/styles/ex02.css">
</head>
<body>

    <h2>1. Horizontal Navigation (inline-block)</h2>
    <nav class="horizontal-nav">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <h2>2. Vertical Navigation (block)</h2>
    <nav class="vertical-nav">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <h2>3. Dropdown Menu</h2>
    <nav class="dropdown-nav">
        <div class="dropdown">
            <button>Menu</button>
            <div class="dropdown-content">
                <a href="#">Profile</a>
                <a href="#">Settings</a>
                <a href="#">Logout</a>
            </div>
        </div>
    </nav>

    <h2>4. Display Table Layout</h2>
    <div class="table">
        <div class="row">
            <div class="cell">Row 1, Col 1</div>
            <div class="cell">Row 1, Col 2</div>
        </div>
        <div class="row">
            <div class="cell">Row 2, Col 1</div>
            <div class="cell">Row 2, Col 2</div>
        </div>
    </div>

</body>
</html>
