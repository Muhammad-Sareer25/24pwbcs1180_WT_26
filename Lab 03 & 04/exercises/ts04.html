<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Styling Portfolio</title>

<link rel="stylesheet" href="/styles/ts4.css">

</head>
<body>

<h1>Image Styling Portfolio</h1>

<div class="gallery">

<!-- Rounded Corner Image -->
<div class="card">
<img src="/images/img1.png" class="rounded">
<p>Rounded Corners</p>
</div>

<!-- Circular Image -->
<div class="card">
<img src="/images/img2.jpeg" class="circle">
<p>Circular Image</p>
</div>

<!-- Image Border and Shadow -->
<div class="card">
<img src="/images/img3.jpg" class="shadow">
<p>Border & Shadow</p>
</div>

<!-- Hover Effect -->
<div class="card">
<img src="/images/img4.JPG" class="hover-effect">
<p>Hover Effect</p>
</div>

<!-- Filter Effect -->
<div class="card">
<img src="/images/img5.jpeg" class="filter">
<p>CSS Filter</p>
</div>

<!-- Overlay Text -->
<div class="card overlay-container">
<img src="/images/img6.HEIC">
<div class="overlay">Beautiful View</div>
</div>

</div>

</body>
</html>
