<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Component Design</title>

<link rel="stylesheet" href="/styles/ts7.css">

</head>
<body>

<h1>Product Cards</h1>

<div class="card-container">

<!-- Card 1 -->
<div class="card">
<img src="../images/product1.png" alt="Product 1">
<h3>Smart Watch</h3>
<p>Modern smartwatch with fitness tracking and notifications.</p>
<button>Buy Now</button>
</div>

<!-- Card 2 -->
<div class="card">
<img src="../images/product2.png" alt="Product 2">
<h3>Wireless Headphones</h3>
<p>High quality wireless headphones with noise cancellation.</p>
<button>Buy Now</button>
</div>

<!-- Card 3 -->
<div class="card">
<img src="../images/product3.png" alt="Product 3">
<h3>Gaming Mouse</h3>
<p>Ergonomic gaming mouse with customizable RGB lighting.</p>
<button>Buy Now</button>
</div>

</div>

</body>
</html>
