<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Practical Layouts</title>
    <link rel="stylesheet" href="/styles/ex09.css">
</head>
<body>

    <!-- 1. Responsive Navbar -->
    <h2>1. Responsive Navbar</h2>
    <nav class="navbar">
        <div class="logo">MySite</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <!-- 2. Card Layout -->
    <h2>2. Card Layout</h2>
    <div class="card-container">
        <div class="card">
            <h3>Card 1</h3>
            <p>Short content</p>
        </div>
        <div class="card">
            <h3>Card 2</h3>
            <p>Longer content with more text to show equal height behavior.</p>
        </div>
        <div class="card">
            <h3>Card 3</h3>
            <p>Medium content</p>
        </div>
    </div>

    <!-- 3. Holy Grail Layout -->
    <h2>3. Holy Grail Layout</h2>
    <div class="holy-grail">
        <header>Header</header>
        <div class="main">
            <aside class="left">Left Sidebar</aside>
            <section class="content">Main Content</section>
            <aside class="right">Right Sidebar</aside>
        </div>
        <footer>Footer</footer>
    </div>

    <!-- 4. Form Layout -->
    <h2>4. Form Layout</h2>
    <form class="form">
        <div class="form-row">
            <label>Name:</label>
            <input type="text">
        </div>

        <div class="form-row">
            <label>Email:</label>
            <input type="email">
        </div>

        <div class="form-row">
            <label>Password:</label>
            <input type="password">
        </div>

        <button type="submit">Submit</button>
    </form>

</body>
</html>
